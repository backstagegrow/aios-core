# Workflow Chains — Greeting Suggestion Data
# Source of truth: .claude/rules/workflow-execution.md
# Used by: Native agent greeting (STEP 3, step 5.5) to suggest next command
# Story: WIS-16

workflows:
  # 1. Story Development Cycle (SDC) — PRIMARY
  - id: sdc
    name: Story Development Cycle
    description: Full 4-phase workflow for all development work
    chain:
      - step: 1
        agent: "@sm"
        command: "*draft"
        task: create-next-story.md
        output: Story file (Draft)
        condition: Epic context available
      - step: 2
        agent: "@po"
        command: "*validate-story-draft {story-id}"
        task: validate-next-story.md
        output: GO/NO-GO decision
        condition: Story status is Draft
      - step: 3
        agent: "@dev"
        command: "*develop {story-id}"
        task: dev-develop-story.md
        output: Implementation complete
        condition: Story status is Approved
        alternatives:
          - agent: "@dev"
            command: "*develop-yolo {story-id}"
            condition: Simple story, autonomous mode preferred
      - step: 4
        agent: "@qa"
        command: "*review {story-id}"
        task: qa-gate.md
        output: PASS/CONCERNS/FAIL/WAIVED
        condition: Story status is Ready for Review
        alternatives:
          - agent: "@qa"
            command: "*gate {story-id}"
            condition: Quick gate decision needed
      - step: 5
        agent: "@devops"
        command: "*push"
        task: github-devops-pre-push-quality-gate.md
        output: Code pushed to remote
        condition: QA gate PASS

  # 2. QA Loop — ITERATIVE REVIEW
  - id: qa-loop
    name: QA Loop
    description: Automated review-fix cycle after initial QA gate
    max_iterations: 5
    chain:
      - step: 1
        agent: "@qa"
        command: "*review {story-id}"
        task: qa-review-story.md
        output: APPROVE/REJECT/BLOCKED verdict
        condition: Story has code changes to review
      - step: 2
        agent: "@dev"
        command: "*apply-qa-fixes"
        task: apply-qa-fixes.md
        output: Fixes applied
        condition: QA verdict is REJECT
        alternatives:
          - agent: "@dev"
            command: "*fix-qa-issues"
            condition: Structured fix from QA_FIX_REQUEST.md
      - step: 3
        agent: "@qa"
        command: "*review {story-id}"
        task: qa-review-story.md
        output: Re-review verdict
        condition: Fixes applied, re-review needed

  # 3. Spec Pipeline — PRE-IMPLEMENTATION
  - id: spec-pipeline
    name: Spec Pipeline
    description: Transform informal requirements into executable spec
    chain:
      - step: 1
        agent: "@pm"
        command: "*gather-requirements"
        task: spec-gather-requirements.md
        output: requirements.json
        condition: New feature or complex change
      - step: 2
        agent: "@architect"
        command: "*analyze-impact"
        task: architect-analyze-impact.md
        output: complexity.json
        condition: Complexity assessment needed (skip if SIMPLE)
      - step: 3
        agent: "@analyst"
        command: "*research {topic}"
        task: create-deep-research-prompt.md
        output: research.json
        condition: STANDARD or COMPLEX class (skip if SIMPLE)
      - step: 4
        agent: "@pm"
        command: "*write-spec"
        task: spec-write-spec.md
        output: spec.md
        condition: Requirements gathered
      - step: 5
        agent: "@qa"
        command: "*critique-spec {story-id}"
        task: spec-critique.md
        output: APPROVED/NEEDS_REVISION/BLOCKED
        condition: Spec written
      - step: 6
        agent: "@architect"
        command: "*plan"
        task: plan-create-implementation.md
        output: implementation.yaml
        condition: Critique verdict is APPROVED

  # 4. Brownfield Discovery — LEGACY ASSESSMENT
  - id: brownfield
    name: Brownfield Discovery
    description: 10-phase technical debt assessment for existing codebases
    chain:
      - step: 1
        agent: "@architect"
        command: "*analyze-brownfield"
        task: analyze-brownfield.md
        output: system-architecture.md
        condition: Existing codebase to assess
      - step: 2
        agent: "@data-engineer"
        command: "*db-schema-audit"
        task: db-schema-audit.md
        output: SCHEMA.md + DB-AUDIT.md
        condition: Database exists in project
      - step: 3
        agent: "@ux-design-expert"
        command: "*audit-frontend"
        task: audit-codebase.md
        output: frontend-spec.md
        condition: Frontend exists in project
      - step: 4
        agent: "@qa"
        command: "*review"
        task: qa-review-story.md
        output: APPROVED/NEEDS WORK
        condition: All specialist reviews complete
      - step: 5
        agent: "@pm"
        command: "*create-epic"
        task: brownfield-create-epic.md
        output: Epic + stories ready for development
        condition: QA gate APPROVED

  # 5. Site Creation — END-TO-END SITE BUILD (Uma / UX-Design-Expert)
  - id: site-creation
    name: Site Creation
    description: End-to-end workflow from brand tokens to deployed pages
    agent: "@ux-design-expert"
    trigger: "*create-site {client-slug}"
    workflow_file: .antigravity/workflows/site-creation.md
    chain:
      - step: 1
        agent: "@ux-design-expert"
        command: "*generate-manifest"
        task: generate-project-manifest.md
        output: project-manifest.yaml at project root
        condition: New site project, or manifest not yet generated
      - step: 2
        agent: "@ux-design-expert"
        command: "*load-brand-tokens {slug}"
        task: load-brand-engine-tokens.md
        output: Token snapshot in .state.yaml
        condition: brand_engine_client set in manifest
        alternatives:
          - agent: "@ux-design-expert"
            command: "*discover"
            condition: No Brand Engine client (custom design system)
      - step: 3
        agent: "@ux-design-expert"
        command: "*spec-page {name}"
        task: spec-page.md
        output: Approved page spec
        condition: Page complexity score >= 9 (4+ sections, forms, integrations)
      - step: 4
        agent: "@ux-design-expert"
        command: "*create-page {name}"
        task: create-page.md
        output: Complete page file
        condition: Design system discovered, spec approved (if required)
        alternatives:
          - agent: "@ux-design-expert"
            command: "*create-page {name}"
            condition: Repeat for each page in site plan
      - step: 5
        agent: "@ux-design-expert"
        command: "*deploy"
        task: deploy.md
        output: Site published to platform
        condition: All pages created and validated
        alternatives:
          - agent: "@devops"
            command: "*push"
            condition: Platform uses git-connected auto-deploy (Cloudflare Pages)

  # 5. Copy Creation Chain — COPY & ADS PRODUCTION
  - id: copy-creation-chain
    name: Copy Creation Chain
    description: Unified entry point for all copy requests — social media, ads, sales pages, scripts
    chain:
      - step: 1
        agent: "nexus-copy-elite/copy_router"
        command: "route {copy-request}"
        output: Classification + routed agent + clone council recommendation
        condition: Any copy request received
      - step: 2
        agent: "nexus-copy-elite/clone_council"
        command: "council {brief}"
        output: Clone Council synthesis (2-3 experts + unified strategic directives)
        condition: Router classification complete
      - step: 3
        agent: "nexus-copy-elite/market_strategist OR revenue-ops/organic_analyst"
        command: "research {client-context}"
        output: Market research + awareness level + hooks
        condition: Council synthesis available
        alternatives:
          - agent: "nexus-copy-elite/market_strategist"
            condition: B2B high-ticket, complex brief
          - agent: "revenue-ops/organic_analyst"
            condition: Existing organic content available for cross-reference
      - step: 4
        agent: "nexus-copy-elite/big_idea_architect"
        command: "ideate {brief + council synthesis + research}"
        output: Big Idea + hook angles
        condition: Research complete
        skip_if: ad_copy or social_post (lightweight — use angles from router instead)
      - step: 5
        agent: "routed-by-step-1"
        command: "write {type}"
        output: Final copy (ads/social/sales-page/script/email)
        condition: Big Idea or Angle Strategy ready
        variants:
          ad_copy: "nexus-revenue-ops/paid_ads_copywriter"
          social_post: "nexus-revenue-ops/social_media_copywriter"
          sales_page: "nexus-conversion-architects/sales_page_copywriter"
          email_sequence: "nexus-copy-elite/conversion_copywriter"
          vsl_script: "nexus-copy-elite/script_specialist"
          brand_copy: "nexus-copy-elite/brand_positioning_writer"
          full_funnel: "nexus-copy-elite (full orchestration)"
      - step: 6
        agent: "nexus-copy-elite/persuasion_optimizer"
        command: "qa {copy}"
        output: Score (0-10) + APPROVED or revision request
        condition: Copy draft complete
        threshold: Score >= 8 required for approval
        alternatives:
          - agent: "nexus-copy-elite/persuasion_optimizer"
            command: "qa-revision {copy + feedback}"
            condition: Score < 8 — max 2 revision cycles
