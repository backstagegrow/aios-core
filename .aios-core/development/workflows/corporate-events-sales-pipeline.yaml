workflow:
  id: corporate-events-sales-pipeline
  name: Corporate Events Sales Pipeline
  version: "1.0"
  description: >-
    Pipeline operacional para posicionamento, narrativa, aquisição, receita e
    auditoria de vendas de eventos corporativos. Estrutura o trabalho em etapas
    com checkpoints claros e revisão humana nas decisões estratégicas.
  type: strategy
  project_types:
    - go-to-market
    - campaign-planning
    - revenue-operations
    - event-marketing

  metadata:
    elicit: true
    confirmation_required: true

  execution_modes:
    - mode: workshop
      description: Execução etapa por etapa com aprovação explícita
      prompts: 5-10
      default: true
    - mode: batch
      description: Geração em lote com consolidação final e flags humanas
      prompts: 1-3

  phases:
    - phase_1: Positioning and Offer
    - phase_2: Narrative and Copy
    - phase_3: Traffic and Acquisition
    - phase_4: Revenue and Operations
    - phase_5: Audit and Scale

  sequence:
    - step: positioning_and_offer
      id: positioning
      phase: 1
      agent: architect
      action: Estruturar posicionamento e oferta do evento
      notes: |
        Objetivo:
        - Definir o posicionamento competitivo do evento
        - Construir a oferta central e o stack de valor
        - Delimitar o que torna o evento inequivocamente relevante para o ICP

        Entradas obrigatórias:
        - Nicho
        - Produto/evento
        - Ticket médio
        - ICP
        - Estágio atual

        Biblioteca de frameworks:
        - docs/strategy/corporate-events-expert-frameworks.md

        Frameworks de referência:
        - hormozi:oferta
        - munger:mental
        - neumeier:onlyness

        Saída esperada:
        - Posicionamento resumido
        - Diferencial competitivo
        - Estrutura de oferta
        - Lista de decisões marcadas como [REQUER REVISÃO HUMANA]
      outputs:
        - positioning_doc
        - offer_stack
        - human_review_flags
      next: narrative

    - step: narrative_and_copy
      id: narrative
      phase: 2
      agent: analyst
      action: Construir narrativa, hook principal e copy-base
      requires: positioning
      notes: |
        Objetivo:
        - Traduzir posicionamento em narrativa e copy
        - Identificar estágio de consciência do mercado
        - Produzir os blocos centrais de mensagem

        Biblioteca de frameworks:
        - docs/strategy/corporate-events-expert-frameworks.md

        Frameworks de referência:
        - schwartz:consciencia
        - mckee:arco
        - georgi:rmbc
        - brunson:hso

        Saída esperada:
        - Hook principal
        - Copy-base da página de vendas
        - Sequência de 5 emails
        - Mensagens que precisam de revisão humana
      outputs:
        - primary_hook
        - sales_page_copy
        - email_sequence
        - copy_review_flags
      next: acquisition

    - step: traffic_and_acquisition
      id: acquisition
      phase: 3
      agent: architect
      action: Estruturar plano de mídia e aquisição com referência ao squad de revenue ops
      requires: narrative
      notes: |
        Objetivo:
        - Converter oferta e narrativa em plano de aquisição por canal
        - Mapear estrutura de campanha, segmentações e cronograma
        - Usar o squad nexus-revenue-ops como referência operacional

        Referências operacionais:
        - squads/nexus-revenue-ops/traffic/meta_ads_optimizer.yaml
        - squads/nexus-revenue-ops/traffic/meta_campaign_builder.yaml
        - docs/strategy/corporate-events-expert-frameworks.md

        Frameworks de referência:
        - mandalia:bpm
        - aslam:soi
        - breeze:aida

        Saída esperada:
        - Plano de mídia
        - Segmentações por canal
        - Ideias de criativos
        - Cronograma
        - Decisões de canal marcadas como [REQUER REVISÃO HUMANA]
      outputs:
        - media_plan
        - channel_segments
        - creative_angles
        - acquisition_timeline
      next: revenue

    - step: revenue_and_operations
      id: revenue
      phase: 4
      agent: analyst
      action: Modelar receita, upsell, patrocínio e gargalo crítico do pipeline
      requires: acquisition
      notes: |
        Objetivo:
        - Modelar monetização primária e secundária
        - Identificar gargalo crítico do pipeline
        - Estruturar ROI, patrocínio, VIP e upsell

        Referência operacional:
        - squad nexus-revenue-ops
        - docs/strategy/corporate-events-expert-frameworks.md

        Frameworks de referência:
        - goldratt:toc
        - Modelagem de upsell, VIP e patrocínio

        Fallback institucional:
        - @analyst assume análise financeira e ROI
        - @architect assume revisão de estratégia digital

        Saída esperada:
        - Modelo de receita
        - Estrutura de upsell
        - Estrutura de patrocínio
        - Gargalo principal do funil
      outputs:
        - revenue_model
        - upsell_structure
        - sponsorship_model
        - bottleneck_report
      next: audit

    - step: audit_and_scale
      id: audit
      phase: 5
      agent: qa
      action: Auditar consistência da jornada e preparar escala
      requires: revenue
      notes: |
        Objetivo:
        - Validar consistência de mensagem entre etapas
        - Revisar risco, coerência e lacunas
        - Preparar roadmap de execução

        Suportes esperados:
        - @ux-design-expert para linguagem visual e experiência
        - @pm para sprints e roadmap

        Checklist:
        - Consistência entre oferta, copy e tráfego
        - Coerência entre canal e promessa
        - Experiência visual e percepção do lead
        - Priorização P1/P2/P3
        - Roadmap semanal

        Saída esperada:
        - Relatório de auditoria
        - Ajustes P1/P2/P3
        - Roadmap de execução
      outputs:
        - audit_report
        - priority_adjustments
        - sprint_roadmap
      next: complete

    - workflow_end:
      id: complete
      action: sales_pipeline_ready
      notes: |
        Pipeline de eventos corporativos consolidado.

        Etapas concluídas:
        - Posicionamento e oferta
        - Narrativa e copy
        - Tráfego e aquisição
        - Receita e operações
        - Auditoria e escala

        Próximo passo:
        - Executar as entregas aprovadas
        - Ou rerodar em modo workshop para revisão de uma etapa específica

  flow_diagram: |
    ```mermaid
    graph TD
        A[Start] --> B[architect: posicionamento e oferta]
        B --> C[analyst: narrativa e copy]
        C --> D[architect: tráfego e aquisição]
        D --> E[analyst: receita e operações]
        E --> F[qa: auditoria e escala]
        F --> G[Pipeline pronto]
    ```

  decision_guidance:
    when_to_use:
      - Planejamento comercial de eventos corporativos
      - Lançamento ou relançamento de eventos
      - Estruturação de aquisição e monetização para eventos B2B
      - Consolidação de oferta, copy, mídia e roadmap

    when_not_to_use:
      - Hotfix operacional de campanha isolada
      - Execução criativa pontual sem contexto estratégico
      - Eventos sem necessidade de modelagem comercial estruturada

  handoff_prompts:
    positioning_ready: |
      ETAPA 1 concluída.
      Posicionamento e oferta estruturados.
      Se modo workshop: aguardar APROVAR / AJUSTAR / AVANÇAR.

    narrative_ready: |
      ETAPA 2 concluída.
      Narrativa e copy-base estruturadas.
      Validar mensagem principal antes de avançar.

    acquisition_ready: |
      ETAPA 3 concluída.
      Plano de mídia e aquisição desenhados.
      Revisar canais pagos e segmentações críticas.

    revenue_ready: |
      ETAPA 4 concluída.
      Modelo de receita, upsell e patrocínio estruturados.
      Confirmar premissas financeiras.

    audit_ready: |
      ETAPA 5 concluída.
      Auditoria e roadmap gerados.
      Pipeline pronto para execução assistida.

