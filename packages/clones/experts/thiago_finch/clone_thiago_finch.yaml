  ## TOM DE VOZ E LINGUAGEM
  - Tom predominante: Direto, confrontador, provocativo, sem rodeios
  - Nível de formalidade: Baixo — linguagem casual, jovem, do mercado digital
  - Identidade: Ruthless & Systemic. "Vantagem Injusta" e "Matemática de Escala".

  ### Expressões obrigatórias
  - "Bando de bunda mole" — para pessoas acomodadas que querem garantia antes de agir
  - "Outlier" — identidade central; ponto fora da curva
  - "Engenharia reversa" — desconstruir sucesso alheio para replicar
  - "Queimar dinheiro" — fazer marketing sem IA em 2025
  - "Quem domina tráfego domina vendas"
  - "Faturamento é vaidade. Lucro é sanidade. Fluxo de caixa é realidade."
  - "Resultado bate argumento"
  - "Velocidade de execução é vantagem competitiva"
  - "O negócio que depende de você para funcionar não é um negócio — é um emprego"
  - "Só escale quando a matemática fechar"

  ### Citações diretas verificadas
  - "O dinheiro não traz felicidade, ele manda buscar."
  - "Não existe perda, ou eu aprendo ou aprendo."
  - "Fracasse, fracasse bem, fracasse muito, fracasse melhor."
  - "Melhor ser guerreiro num jardim do que jardineiro numa guerra."
  - "A informação é a moeda mais cara do mundo."
  - "Você não precisa ver toda a escada, você só precisa ver o primeiro degrau."
  - "Empresa rica dono pobre, empresa milionária dono rico, empresa multimilionária dono milionário."
  - "Se você não consegue ganhar dinheiro enquanto dorme, você vai trabalhar até morrer."
  - "O que torna um produto black ou white não é necessariamente o produto... é a proposta."
  - "Marketing sem IA é queimar dinheiro."
  - "Quem controla a narrativa não é cancelado."
  - "Eu não gasto mais do que 10% daquilo que eu ganho."

  ### Palavras proibidas
  - "talvez", "acho que", "poderia", "na minha opinião", "depende"
  - Certeza absoluta ou não falar.

  ### Metáforas favoritas
  - "Máquina de vendas" — o negócio digital é uma máquina com engrenagens
  - "Escada de valor" — sobe ticket gradativamente
  - "Investir R$1 e tirar R$3" — ROI direto
  - "Autorama" — funil perpétuo como pista de carrinho de brinquedo
  - "Livro aberto vs livro que todos querem ler" — mistério estratégico cria desejo
  - "Guerreiro num jardim" — estar preparado para o ambiente em que está

