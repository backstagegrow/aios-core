  ### Página Apollo — 9 Passos (Blueprint de Alta Conversão)
  Template criado por Finch unindo os melhores elementos de todas as suas páginas PLR.
  1. **Headline:** Promessa ousada, reclamação ultrajante ou questão. Foco no benefício emocional, não features.
  2. **VSL central:** O "tiro de canhão". Para tráfego frio, oculta elementos abaixo com delay — foco 100% no vídeo.
  3. **Lead:** Texto curto abaixo do VSL. 3 abordagens: cenário | história | perguntas que "leem a mente".
  4. **História:** Herói (você, terceiro ou cliente) → obstáculo → virada → vitória via método.
  5. **Pit (Pitch):** Introduz o produto sutilmente como solução. Regra: nome único e exclusivo (ex: "Plano Ketox 30").
  6. **Evidência:** Depoimentos em texto/vídeo. Se produto novo: prints de portais de notícias validando o conceito.
  7. **Oferta (Stack):** Produto + bônus com valores individuais. Soma total → preço real revelado como desconto absurdo.
  8. **Acordo:** Escassez + urgência (tempo, vagas, prazo de bônus) + Garantia (7/15/30 dias ou 200% de devolução).
  9. **Q&A:** 6 perguntas frequentes: como recebe acesso | prazo de resultados | como funciona a garantia | contraindicações.

  ### Método dos 4 Sims (Validação de Produto)
  Framework para escolha de produto sem apego emocional. Só avança se responder SIM para os 4:
  1. **Dor/urgência/paixão irracional?** Ex: "entrar no vestido de noiva a tempo" | "parceiro traindo à distância"
  2. **Cliente pesquisa proativamente?** Validar no Google Trends, grupos de FB, fóruns. Se não busca → esforço x10.
  3. **Poucas opções no mercado?** Criar subnicho com nome próprio. "Emagrecer" → "Plano Ketox 30: sem academia".
  4. **Ao menos 1 em 1.000 buscando?** Mesmo nichado precisa ter escala. Relacionamento à distância = ainda milhares.

  ### Framework Facebook Ads — 3 Fases + Escala de Milhões
  **Fase 1 — Teste de Criativos:**
  - Estrutura: 1 campanha > 4 conjuntos > 2 anúncios cada (8 total)
  - Público aberto (sem interesses, só idade + excluir profissionais de mkt)
  - Orçamento ABO: R$25/dia até metade do ticket do produto
  - Validação após 48-72h: aprovado se atingir 2 de 3 critérios:
    → Pelo menos 1 venda | 20+ Initiate Checkouts | CTR de link >2%

  **Fase 2 — Teste de Públicos:**
  - Anúncio vencedor testado em diferentes segmentações (interesses, lookalikes, estados)
  - Pausar após 48h: 0 vendas + CTR <2% + <10 Initiate Checkouts

  **Fase 3 — Escala de Milhões (3 Métodos):**
  - **Sun Tzu (98% dos casos):** +20-30% de orçamento todo dia às 20h
    → CPA menor que ideal: continuar escalando | CPA empatado: manter | CPA +10% acima: regredir 2 níveis
  - **Musk:** Para picos de CPA. Dimensionar = (vendas últimas 24h) × CPA ideal
  - **Napoleão:** Escala agressiva em conta nova. Saltos gigantes a cada 24h: inicial → R$200 → R$500 → R$2.000

  **Bússola de Métricas (10 colunas):** CPA | Valor gasto | Valor de conversão | Cartão único | Alcance | CTR link | Frequência

  **Avaliador Automático (após 2.000 cliques):** Produto só tem potencial se bater 6 métricas:
  - CPM < R$16 | CTR de link >3% | Custo por Initiate Checkout <R$6
  - Conversão clique→checkout ≥4% | Conversão checkout ≥20% | Conversão global >0,8%

  ### Framework de Escala: 3 Fases do Negócio
  - Fase 1 — Validação (R$0→R$10k/mês): produto validado, funil funcionando, CAC < LTV
  - Fase 2 — Otimização (R$10k→R$100k/mês): aumentar conversão, reduzir CPL, testar criativos
  - Fase 3 — Escala Total (R$100k+/mês): aumentar budget, novos canais, afiliados

  ## COPYWRITING GRANULAR

  ### Gancho (0–3 segundos)
  - Interrupção de padrão + promessa específica e forte
  - Tocar diretamente na dor do avatar ("Ei, você que vive no efeito sanfona...")
  - Formatos: promessa | prova antes/depois | início de história | pergunta confrontadora | quebra visual
  - Objetivo do gancho: fazer a pessoa assistir a VSL, não comprar

  ### Headlines
  - Ancoragem valor vs preço: "Vou te ensinar a faturar R$10k e você só vai pagar R$27,90"
  - Especificidade gera credibilidade: números exatos quebrados (não "vários alunos", mas "12 alunos geraram R$13.000 cada")

  ### Storytelling na VSL (Jornada do Herói)
  1. Vida normal do protagonista + dores detalhadas
  2. Agravamento: "cavando a própria cova", fundo do poço
  3. Grande Basta: ponto de inflexão — promete mudar ou morrer tentando
  4. Descoberta da solução + objeções iniciais + como superou
  5. Resultados + prova

  ### Copy de Anúncio no Facebook (Anatomia)
  Ordem de leitura do cérebro: 1º Imagem → 2º Headline → 3º Texto Principal
  - **Texto principal:** Pequeno e descritivo, ou em branco. Não poluir.
  - **Headline:** Curta, cabe no celular. = Ângulo + Gancho.
    Ganchos white: Curiosidade/pergunta | Controvérsia (oposto do senso comum) | Inimigo comum | Exclusividade
  - **CTA:** Sempre "Saiba Mais". NUNCA "Comprar" ou "Obter oferta" — não assusta o cliente.
  - **Descrição:** Deixar vazia.
  - **Regra dos 20%:** Texto na imagem não ultrapassa 20% do espaço.
  - **Gancho Duplo (Outlier):** Texto gatilho dentro da imagem + pergunta na headline. Ex: imagem: "Caso ele esteja te ignorando, faça isso" | headline: "Depois que comecei a ignorá-lo, ele voltou. Por quê?"
  - **Imagens vencedoras:** 1080x1080 Canva. Vetores/ilustrações estilo WikiHow — nativos, fogem da cegueira de banner.

  ### 11 Objeções + Como Quebrar
  1. "Isso não dá certo" → Mostrar que não é método comum, é único e específico
  2. "Não dá certo pra mim" → Todos os alunos começaram do zero como você
  3. "Não confio no vendedor" → Humanizar: vendedor passou pelas mesmas dificuldades + prova social
  4. "Não vou conseguir implementar" → "Tem computador, conexão e dois braços? Acabou."
  5. "Vou deixar para depois" → Escassez/medo: bônus somem, oferta sai do ar
  6. "Preciso falar com esposa/pai" → "Quer liberdade financeira? Tome suas próprias decisões."
  7. "Ninguém pode saber" → "Na fatura aparece só o nome da plataforma, não do produto."
  8. "E se der certo?" (medo do sucesso) → "Quer ser a mesma pessoa em 5 anos? OK, não faça nada."
  9. "Não tenho dinheiro" → Preço irrisório: divide por 12x, compara com pizza/café. "Por isso você ainda está nessa situação."
  10. "E se não gostar?" → Garantia incondicional 7-60 dias, 100% devolvido sem perguntas
  11. Bloqueios específicos → Mapear comentários e objeções frequentes → virar headline de anúncio

  ### Funil Completo — Isca → Checkout → Follow-up
  **Isca + Captura:**
  - Isca gratuita (ebook/planilha/receita) troca contato (nome + email + WhatsApp)
  - Página de captura: simples, headline curta, mockup da isca, formulário embutido ou pop-up
  - Conversão saudável: 5-10% dos leads capturados compram a oferta inicial

  **Captura pré-checkout:**
  - Pop-up obrigatório ANTES do checkout captura email+WhatsApp
  - Garante contato mesmo se cliente abandonar no pagamento

  **Follow-up automático (email + WhatsApp):**
  - 30 min após não comprar: "Vi que entrou e não comprou. Preparei [bônus/depoimento/vídeo]."
  - Dia 1, 2, 3+: novos ângulos e argumentos. Newsletter: 3 emails de conteúdo → 4º email com oferta.

  **Recuperação de carrinho:**
  - Automações imediatas para quem abandonou checkout
  - Equipe humana via WhatsApp exclusivo para suporte/recuperação
  - Contato 1:1 com quem gerou boleto (até 48h para pagar)

  ### Criação de Produto do Zero (Processo PLR)
  1. **Pesquisa:** Amazon Best Sellers + ClickBank (filtrar por Gravidade) + Google ("PLR [nicho]")
  2. **Compra:** US$5-20. Evitar PLR barato/IA. Comprar 2 sobre o mesmo tema para mesclar.
  3. **Monstro:** Juntar 1-3 PLRs num único documento bruto.
  4. **Lapidação:** Tradução bruta → grifar amarelo só o tático/prático → descartar teoria.
  5. **Tradução oficial:** Terceirizar no Workana. Ghostwriter adapta para cultura brasileira.
  6. **Envelopamento (Efeito Starbucks):** Nunca vender PDF cru. Converter em videoaulas ou audiobook + design premium.
  7. **Nome:** Único, com Palavras de Poder (resultado, não técnica) + aliteração/rima se possível. Ex: "Ketox 30".
  8. **Diagramação:** Crello/Canva com templates. Imagens contextuais a cada parágrafo.
  9. **Logo + Mockup:** Referências no GraphicRiver. Canva 1080x1080. Regra MVP: máx 1h na logo inicial.
  10. **Ticket ideal:** R$97-R$397. Acima = funil longo. Abaixo = só vale com upsell.

