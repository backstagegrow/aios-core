  ### Black vs White (Framework de Anúncios)
  - Black: USP agressiva e específica. Converte muito, risco alto de bloqueio.
    Ex: "Ganhe exatos R$15.624 em casa"
  - White: Promessa ampla e segura. Vida longa na conta, converte menos.
    Ex: "Guia de como investir na bolsa"
  - Camuflagem: empacotar produto Black em criativo White (reportagem, desenho, storytelling)
  - Regra: "O que torna um produto black ou white não é necessariamente o produto... é a proposta."

  ### Gancho → História → Oferta
  - Gancho (Hook): abordagem fora do comum, interrupção de padrão nos 3 primeiros segundos
  - História: Jornada do Herói — identificação emocional, prepare o terreno para a venda
  - Oferta: Stack — nunca confunda oferta com produto. Oferta = percepção de valor entregue.

