      insight: "A fase Research do RMBC deve incluir um Search Intent Audit antes de selecionar o mecanismo. Pessoas pesquisando solucoes no Google tem nivel de intencao fundamentalmente diferente de quem scrolla passivamente no feed social — e o mecanismo que converte um buscador de alta intencao (especifico, tecnico) frequentemente confunde um prospect de baixa consciencia social (precisa de gancho emocional mais amplo). Antes de desenvolver o Mecanismo, defina o canal de aquisicao primario: se for busca (alta intencao), aprofunde especificidade e prova; se for social (baixa intencao), aprofunde gatilho emocional e curiosidade. A intencao do canal determina qual arquetipo de mecanismo desenvolver."
      score_delta: 2
    - session: "roundtable_session_5"
      source: "todd_brown"
      insight: "A fase M (Mecanismo) do RMBC mapeia diretamente para o pilar Mechanism do E5 — mas o framework de Todd Brown adiciona um passo critico pre-mecanismo: o Diagnostico de Market Sophistication. Antes de desenvolver o mecanismo, identifique em qual estagio de sofisticacao o mercado esta (1-5). Mercado em Stage 1-2 precisa de mecanismo direto e amplo; Stage 4-5 exige mecanismo genuinamente novo, especifico e contra-narrativo. Escrever RMBC sem auditoria de sofisticacao desperdicca pesquisa — o mecanismo pode ser excelente para Stage 2 mas invisivel em Stage 5. Adicionar Sophistication Stage como Step 0 da fase Research do RMBC."
      score_delta: 2
    - session: "roundtable_session_6"
      source: "alex_hormozi"
      insight: "A secao Close do RMBC e onde o Value Stack de Hormozi se integra diretamente. Um close que lista features ('voce recebe X, Y, Z') tem conversao fraca — o Value Stack transforma o close em prova matematica de que o preco e irracional recusar. Integracao: no Close de qualquer VSL ou carta longa, aplique a Value Equation de Hormozi (dream outcome × perceived probability / time to result × effort) a cada elemento do offer stack. Depois ancore o valor total contra o preco. Isso nao e upsell — e converter o IP ja escrito no Brief em argumento de valor quantificado."
      score_delta: 2
    - session: "roundtable_session_7"
      source: "eli_goldratt"
      insight: "O Brief do RMBC (fase B) e um mapa de constraints: as 12 perguntas identificam sistematicamente o ponto mais fraco da narrativa de conversao. Se o Brief revela prova fraca (gap de credibilidade), mecanismo fraco (gap de credibilidade) ou pesquisa fraca (gap de linguagem), esses sao os constraints — e escrever uma VSL polida sobre um constraint nao resolvido e o equivalente de otimizar um nao-gargalo na TOC. Integracao: trate cada pergunta do Brief como verificacao de constraint. Se qualquer resposta estiver 'vaga' ou 'fraca', congele a execucao de copy e resolva aquele constraint especifico primeiro. Um Brief so esta completo quando cada resposta pode ser lida como copy pronta para usar."
      score_delta: 2
    - session: "roundtable_session_8"
      source: "eugene_schwartz"
      insight: "A pergunta central do RMBC Brief — 'qual e o mecanismo?' — mapeia diretamente para o Estagio de Sofisticacao de Schwartz. Em Stage 3, o mecanismo IS a copy — a secao de mecanismo do Brief precisa ser tao nova que acionaria o reposicionamento de 'novo mecanismo' de Schwartz. Quando a pesquisa RMBC revela que o mercado ja ouviu a claim antes (Stage 4+), o Brief esta incompleto ate que o mecanismo seja reposicionado via sub-mecanismo especifico ou estreitamento de nicho. Integracao pratica: na fase R (Research) do RMBC, score explicitamente o mecanismo contra os 5 estagios de Schwartz antes de escrever. Se o mercado esta em Stage 4+, o Brief so esta completo quando o mecanismo e genuinamente novo para aquele estagio."
      score_delta: 2
