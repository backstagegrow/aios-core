<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect x="0" y="0" width="1080" height="1350" rx="0" fill="#0A0A0A" stroke="none" stroke-width="1" opacity="1"/>
  <text x="64" y="96" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#84CC16" text-anchor="start" opacity="1">A REALIDADE</text>
  <text x="64" y="160" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="50" font-weight="800" fill="#FFFFFF" text-anchor="start" opacity="1">Os números</text>
  <text x="64" y="220" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="50" font-weight="800" fill="#84CC16" text-anchor="start" opacity="1">não mentem</text>

  <!-- Stat 1 -->
  <rect x="64" y="300" width="464" height="260" rx="20" fill="#1A1A1A" stroke="#84CC16" stroke-width="1" opacity="1"/>
  <rect x="64" y="300" width="464" height="260" rx="20" fill="none" stroke="#84CC16" stroke-width="1" opacity="0.3"/>
  <text x="96" y="420" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="900" fill="#84CC16">73%</text>
  <text x="96" y="456" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="start" opacity="1">das PMEs fecham em 5 anos</text>
  <text x="96" y="480" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">Por falta de aquisição consistente</text>
  <text x="96" y="498" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">de novos clientes</text>

  <!-- Stat 2 -->
  <rect x="576" y="300" width="440" height="260" rx="20" fill="#1A1A1A" stroke="rgba(255,255,255,0.07)" stroke-width="1" opacity="1"/>
  <text x="608" y="420" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="900" fill="#A3E635">8×</text>
  <text x="608" y="456" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="start" opacity="1">mais barato reter</text>
  <text x="608" y="480" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">Mas você precisa ter</text>
  <text x="608" y="498" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">clientes para reter</text>

  <!-- Stat full width -->
  <rect x="64" y="596" width="952" height="220" rx="20" fill="#1A1A1A" stroke="rgba(255,255,255,0.07)" stroke-width="1" opacity="1"/>
  <text x="96" y="700" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="900" fill="#A3E635">R$ 0</text>
  <text x="96" y="740" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="start" opacity="1">de faturamento previsível sem sistema de aquisição</text>
  <text x="96" y="766" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">Indicação é canal passivo. Negócio saudável precisa de canal ativo, escalável</text>
  <text x="96" y="786" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">e mensurável.</text>

  <!-- Quote -->
  <rect x="64" y="856" width="952" height="100" rx="16" fill="rgba(132,204,22,0.06)" stroke="#84CC16" stroke-width="1" opacity="0.3"/>
  <text x="96" y="912" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="start" opacity="1">"Quem não tem sistema de aquisição, tem reza. E reza não paga boleto."</text>

  <text x="1016" y="96" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="end" opacity="0.2">03 / 06</text>
  <text x="1016" y="1306" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#84CC16" text-anchor="end" opacity="0.5">bksgrow.com.br</text>
</svg>