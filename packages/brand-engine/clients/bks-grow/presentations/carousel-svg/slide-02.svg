<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect x="0" y="0" width="1080" height="1350" rx="0" fill="#0A0A0A" stroke="none" stroke-width="1" opacity="1"/>
  <text x="64" y="96" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#84CC16" text-anchor="start" opacity="1">O PROBLEMA</text>
  <text x="64" y="160" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="50" font-weight="800" fill="#FFFFFF" text-anchor="start" opacity="1">Você reconhece</text>
  <text x="64" y="220" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="50" font-weight="800" fill="#FFFFFF" text-anchor="start" opacity="1">algum desses</text>
  <text x="64" y="280" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="50" font-weight="800" fill="#84CC16" text-anchor="start" opacity="1">cenários?</text>
  
  <rect x="64" y="360" width="952" height="140" rx="16" fill="#1A1A1A" stroke="rgba(239,68,68,0.25)" stroke-width="1" opacity="1"/>
  <!-- icon circle -->
  <rect x="96" y="410" width="44" height="44" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="118" y="439" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="20" text-anchor="middle">📉</text>
  <!-- label -->
  <text x="160" y="432" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="start" opacity="1">Mês bom, mês ruim — sem previsibilidade</text>
  <text x="160" y="454" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">O faturamento oscila. Quando indicações param, a receita some.</text>
  
  <rect x="64" y="524" width="952" height="140" rx="16" fill="#1A1A1A" stroke="rgba(239,68,68,0.25)" stroke-width="1" opacity="1"/>
  <!-- icon circle -->
  <rect x="96" y="574" width="44" height="44" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="118" y="603" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="20" text-anchor="middle">📲</text>
  <!-- label -->
  <text x="160" y="596" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="start" opacity="1">Posta nas redes, mas ninguém compra</text>
  <text x="160" y="618" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">Investe tempo em conteúdo, acumula likes, não converte em clientes.</text>
  
  <rect x="64" y="688" width="952" height="140" rx="16" fill="#1A1A1A" stroke="rgba(239,68,68,0.25)" stroke-width="1" opacity="1"/>
  <!-- icon circle -->
  <rect x="96" y="738" width="44" height="44" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="118" y="767" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="20" text-anchor="middle">🔄</text>
  <!-- label -->
  <text x="160" y="760" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="start" opacity="1">Depende das mesmas pessoas de sempre</text>
  <text x="160" y="782" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#A1A1AA" text-anchor="start" opacity="1">Os mesmos 5 clientes indicando os mesmos perfis. Zero crescimento.</text>
  <text x="64" y="900" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="500" fill="#A1A1AA" text-anchor="start" opacity="1">Se você se identificou com pelo menos 1 desses...</text>
  <text x="64" y="928" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="start" opacity="1">o próximo slide é para você.</text>
  <text x="1016" y="96" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="end" opacity="0.2">02 / 06</text>
  <text x="1016" y="1306" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#84CC16" text-anchor="end" opacity="0.5">bksgrow.com.br</text>
</svg>