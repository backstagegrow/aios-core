  current: "site-creation"
  current_step: "summary"
  pages_planned:
    - name: "Home"
      route: "/"
      file: "index.html"
    - name: "Plenária"
      route: "/plenaria"
      file: "plenaria.html"
    - name: "Garden"
      route: "/garden"
      file: "garden.html"
    - name: "Térreo"
      route: "/terreo"
      file: "terreo.html"
  pages_created:
