<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C9A24A;margin-bottom:18px;font-weight:600}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:84px;height:84px;background:#161412;border:1px solid rgba(201,162,74,.5);display:flex;align-items:center;justify-content:center;color:#C9A24A;font-family:var(--aba-font-mono);font-size:11px}
  .name{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A8273;font-weight:600}
</style></head><body>
<div class="label">Radii</div>
<div class="row">
  <div class="item"><div class="box" style="border-radius:2px">2</div><div class="name">XS</div></div>
  <div class="item"><div class="box" style="border-radius:4px">4</div><div class="name">SM</div></div>
  <div class="item"><div class="box" style="border-radius:8px">8</div><div class="name">MD</div></div>
  <div class="item"><div class="box" style="border-radius:14px">14</div><div class="name">LG · cards</div></div>
  <div class="item"><div class="box" style="border-radius:22px">22</div><div class="name">XL</div></div>
  <div class="item"><div class="box" style="border-radius:999px">∞</div><div class="name">Pill · CTA</div></div>
</div>
</body></html>
