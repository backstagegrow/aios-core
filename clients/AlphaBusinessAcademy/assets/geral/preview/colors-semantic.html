<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:12px}
  .sw{flex:1;height:120px;border-radius:8px;display:flex;flex-direction:column;justify-content:space-between;padding:14px;font-size:11px;color:#F5EFE0}
  .sw .n{font-weight:700;font-size:13px;letter-spacing:.04em}
  .sw .h{font-family:var(--aba-font-mono);opacity:.85;font-size:10px}
  .sw .role{font-size:9px;letter-spacing:.24em;text-transform:uppercase;opacity:.85;font-weight:700}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--aba-gold);margin-bottom:12px;font-weight:600}
</style></head><body>
<div class="label">Semantic · use sparingly</div>
<div class="row">
  <div class="sw" style="background:#4FA86A"><div class="role">Success</div><div><div class="n">Success</div><div class="h">#4FA86A</div></div></div>
  <div class="sw" style="background:#E0A93B;color:#0A0A0A"><div class="role">Warning</div><div><div class="n">Warning</div><div class="h">#E0A93B</div></div></div>
  <div class="sw" style="background:#C84A3D"><div class="role">Danger / Urgency</div><div><div class="n">Danger</div><div class="h">#C84A3D</div></div></div>
  <div class="sw" style="background:#5C8AA8"><div class="role">Info</div><div><div class="n">Info</div><div class="h">#5C8AA8</div></div></div>
</div>
</body></html>
