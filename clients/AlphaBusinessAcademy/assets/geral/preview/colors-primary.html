<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Color Primary</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:16px;align-items:stretch}
  .swatch{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;min-height:160px;border:1px solid var(--aba-border-2);position:relative;overflow:hidden}
  .swatch.gold{background:#C9A24A;color:#0A0A0A;border-color:transparent}
  .swatch.black{background:#0A0A0A;color:#F5EFE0;border-color:rgba(201,162,74,.4)}
  .swatch.ivory{background:#F5EFE0;color:#0A0A0A;border-color:transparent}
  .swatch.gold-light{background:#E6C879;color:#0A0A0A;border-color:transparent}
  .swatch.gold-deep{background:#8E6F25;color:#F5EFE0;border-color:transparent}
  .name{font-weight:600;font-size:14px;letter-spacing:.04em}
  .hex{font-family:var(--aba-font-mono);font-size:12px;opacity:.75;margin-top:2px}
  .pill{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;opacity:.7}
</style></head><body>
<div class="row">
  <div class="swatch black"><span class="pill">Primary</span><div class="name">Preto</div><div class="hex">#0A0A0A</div></div>
  <div class="swatch gold"><span class="pill">Primary</span><div class="name">Dourado</div><div class="hex">#C9A24A</div></div>
  <div class="swatch gold-light"><span class="pill">Highlight</span><div class="name">Gold Light</div><div class="hex">#E6C879</div></div>
  <div class="swatch gold-deep"><span class="pill">Pressed</span><div class="name">Gold Deep</div><div class="hex">#8E6F25</div></div>
  <div class="swatch ivory"><span class="pill">Surface</span><div class="name">Ivory</div><div class="hex">#F5EFE0</div></div>
</div>
</body></html>
