<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:32px;box-sizing:border-box}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C9A24A;margin-bottom:24px;font-weight:600}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .c{background:#161412;border-radius:12px;padding:20px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(245,239,224,.06)}
  .c.s1{box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .c.s2{box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .c.s3{box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .c.gold{box-shadow:0 0 0 1px rgba(201,162,74,.6),0 12px 48px rgba(201,162,74,.35);border-color:transparent}
  .n{font-size:12px;font-weight:600;color:#F5EFE0}
  .v{font-family:var(--aba-font-mono);font-size:10px;color:#8A8273;margin-top:4px}
</style></head><body>
<div class="label">Elevation · warm shadows + gold halo</div>
<div class="row">
  <div class="c s1"><div class="n">Shadow 1</div><div class="v">subtle / chips</div></div>
  <div class="c s2"><div class="n">Shadow 2</div><div class="v">cards default</div></div>
  <div class="c s3"><div class="n">Shadow 3</div><div class="v">modals / hero cards</div></div>
  <div class="c gold"><div class="n">Gold Halo</div><div class="v">CTA hover</div></div>
</div>
</body></html>
