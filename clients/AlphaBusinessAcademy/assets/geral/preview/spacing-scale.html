<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C9A24A;margin-bottom:14px;font-weight:600}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .tk{width:60px;font-family:var(--aba-font-mono);font-size:11px;color:#8A8273}
  .px{width:50px;font-family:var(--aba-font-mono);font-size:11px;color:#C9C2B0}
  .bar{height:14px;background:linear-gradient(90deg,#C9A24A,#8E6F25);border-radius:2px}
</style></head><body>
<div class="label">Spacing · 8pt base</div>
<div class="row"><div class="tk">space-1</div><div class="px">4</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="tk">space-2</div><div class="px">8</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="tk">space-3</div><div class="px">12</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="tk">space-4</div><div class="px">16</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="tk">space-5</div><div class="px">24</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="tk">space-6</div><div class="px">32</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="tk">space-7</div><div class="px">48</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="tk">space-8</div><div class="px">64</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="tk">space-9</div><div class="px">96</div><div class="bar" style="width:96px"></div></div>
<div class="row"><div class="tk">space-10</div><div class="px">128</div><div class="bar" style="width:128px"></div></div>
</body></html>
