<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Quote / Engrave</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:32px;box-sizing:border-box;display:flex;gap:32px;align-items:center}
  .quote{flex:1;font-family:var(--aba-font-display);font-style:italic;font-weight:400;font-size:30px;line-height:1.2;color:#F5EFE0;border-left:1px solid #C9A24A;padding-left:22px}
  .quote .attr{display:block;font-style:normal;font-family:var(--aba-font-sans);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C9A24A;margin-top:18px;font-weight:600}
  .engrave{width:200px;text-align:center}
  .engrave .num{font-family:var(--aba-font-display);font-weight:700;font-size:140px;line-height:1;background:linear-gradient(180deg,#E6C879 0%,#C9A24A 50%,#8E6F25 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 1px 0 rgba(0,0,0,.4)}
  .engrave .lbl{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#8A8273;font-weight:600;margin-top:6px}
</style></head><body>
<div class="quote">"O dono que terceiriza decisão constrói uma operação que não para de pedir socorro."<span class="attr">— Lucas Silva</span></div>
<div class="engrave"><div class="num">III</div><div class="lbl">Engraved Numeral</div></div>
</body></html>
