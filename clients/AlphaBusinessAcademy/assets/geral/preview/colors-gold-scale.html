<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Gold Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:6px}
  .sw{flex:1;height:140px;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px}
  .sw .n{font-weight:700;letter-spacing:.04em}
  .sw .h{font-family:var(--aba-font-mono);opacity:.65;font-size:9px}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--aba-gold);margin-bottom:12px;font-weight:600}
</style></head><body>
<div class="label">Gold Scale · 50 → 900</div>
<div class="row">
  <div class="sw" style="background:#FBF5E3;color:#0A0A0A"><div class="n">50</div><div class="h">FBF5E3</div></div>
  <div class="sw" style="background:#F2E2B0;color:#0A0A0A"><div class="n">100</div><div class="h">F2E2B0</div></div>
  <div class="sw" style="background:#E6C879;color:#0A0A0A"><div class="n">200</div><div class="h">E6C879</div></div>
  <div class="sw" style="background:#D9B25C;color:#0A0A0A"><div class="n">300</div><div class="h">D9B25C</div></div>
  <div class="sw" style="background:#C9A24A;color:#0A0A0A;outline:2px solid #F5EFE0;outline-offset:-2px"><div class="n">400 ★</div><div class="h">C9A24A</div></div>
  <div class="sw" style="background:#B08A36;color:#F5EFE0"><div class="n">500</div><div class="h">B08A36</div></div>
  <div class="sw" style="background:#8E6F25;color:#F5EFE0"><div class="n">600</div><div class="h">8E6F25</div></div>
  <div class="sw" style="background:#6B521A;color:#F5EFE0"><div class="n">700</div><div class="h">6B521A</div></div>
  <div class="sw" style="background:#483710;color:#F5EFE0"><div class="n">800</div><div class="h">483710</div></div>
  <div class="sw" style="background:#2A2008;color:#F5EFE0"><div class="n">900</div><div class="h">2A2008</div></div>
</div>
</body></html>
