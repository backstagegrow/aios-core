<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Ink/Neutral Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:6px}
  .sw{flex:1;height:140px;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;border:1px solid rgba(245,239,224,.06)}
  .sw .n{font-weight:700;letter-spacing:.04em}
  .sw .h{font-family:var(--aba-font-mono);opacity:.65;font-size:9px}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--aba-gold);margin-bottom:12px;font-weight:600}
</style></head><body>
<div class="label">Ink Scale · warm-black neutrals</div>
<div class="row">
  <div class="sw" style="background:#0A0A0A;color:#F5EFE0"><div class="n">950</div><div class="h">0A0A0A</div></div>
  <div class="sw" style="background:#111111;color:#F5EFE0"><div class="n">900</div><div class="h">111111</div></div>
  <div class="sw" style="background:#161412;color:#F5EFE0"><div class="n">850</div><div class="h">161412</div></div>
  <div class="sw" style="background:#1C1A17;color:#F5EFE0"><div class="n">800</div><div class="h">1C1A17</div></div>
  <div class="sw" style="background:#2A2722;color:#F5EFE0"><div class="n">700</div><div class="h">2A2722</div></div>
  <div class="sw" style="background:#3D3830;color:#F5EFE0"><div class="n">600</div><div class="h">3D3830</div></div>
  <div class="sw" style="background:#5A544A;color:#F5EFE0"><div class="n">500</div><div class="h">5A544A</div></div>
  <div class="sw" style="background:#7C7669;color:#F5EFE0"><div class="n">400</div><div class="h">7C7669</div></div>
  <div class="sw" style="background:#A39A86;color:#0A0A0A"><div class="n">300</div><div class="h">A39A86</div></div>
  <div class="sw" style="background:#CFC6B2;color:#0A0A0A"><div class="n">200</div><div class="h">CFC6B2</div></div>
  <div class="sw" style="background:#ECE6D5;color:#0A0A0A"><div class="n">100</div><div class="h">ECE6D5</div></div>
  <div class="sw" style="background:#F8F4E8;color:#0A0A0A"><div class="n">050</div><div class="h">F8F4E8</div></div>
</div>
</body></html>
