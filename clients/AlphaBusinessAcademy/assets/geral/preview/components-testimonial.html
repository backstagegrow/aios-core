<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<title>ABA — Testimonial</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0A0A0A;color:#F5EFE0;font-family:var(--aba-font-sans);padding:24px;box-sizing:border-box}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#C9A24A;margin-bottom:16px;font-weight:600}
  .card{background:#161412;border:1px solid rgba(201,162,74,.22);border-radius:14px;padding:24px;display:flex;gap:18px;align-items:flex-start;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .av{width:64px;height:64px;border-radius:50%;background-image:url('../assets/portrait-jose-ricardo.webp');background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(201,162,74,.4)}
  .body{flex:1;min-width:0}
  .quote{font-family:var(--aba-font-display);font-style:italic;font-size:18px;line-height:1.4;color:#F5EFE0;margin:0 0 12px}
  .meta{display:flex;gap:10px;align-items:center;font-size:11px;color:#8A8273}
  .name{color:#C9A24A;font-weight:600;letter-spacing:.04em}
  .stars{color:#C9A24A;font-size:13px;letter-spacing:2px}
</style></head><body>
<div class="label">Testimonial Card</div>
<div class="card">
  <div class="av"></div>
  <div class="body">
    <div class="stars">★★★★★</div>
    <p class="quote">"Apliquei o método e em 4 meses aumentei 50% do faturamento sem trabalhar mais horas. A diferença foi sair da operação."</p>
    <div class="meta"><span class="name">JOSÉ RICARDO</span><span>·</span><span>Franqueado Food Service</span></div>
  </div>
</div>
</body></html>
