# project-manifest.yaml — Alpha Business Academy LP (Next.js)
# Gerado por: *create-site alpha
# Projeto Next.js App Router — SEPARADO de landing_page/ (HTML estático).

project:
  name: "Alpha Business Academy LP"
  slug: "alpha-lp"
  client: "alpha"
  type: "landing-page"
  status: "active"

framework:
  type: "nextjs"
  version: "15"
  language: "tsx"
  router: "nextjs-app"
  styling: "css-modules + css-vars"
  tailwind_version: "none"           # Sem Tailwind — usa tokens.css + globals.css

tokens:
  source: "tokens/tokens.css"        # Primitivos aqui → globals.css mapeia semanticamente
  brand_engine_client: "alpha"
  colors:
    background: "#0A0A0A"            # --background-dark
    surface: "#141414"               # --surface
    surface_light: "#1E1E1E"         # --surface-light
    primary: "#C9A24A"               # --amber (action primary)
    primary_hover: "#D4B66E"         # --amber-light
    primary_dark: "#A6843A"          # --amber-dark
    text_primary: "#FAF9F6"          # --foreground-light
    text_muted: "#9CA3AF"            # --gray-500
    danger: "#EF4444"                # --error
    success: "#22C55E"               # --success
    warning: "#F59E0B"               # --warning
  typography:
    font_display: "Inter"            # --font-family-heading (Inter, system-ui)
    font_body: "Inter"               # --font-family-body
    font_mono: "ui-monospace"        # --font-family-mono
    weights: [400, 500, 600, 700, 900]
  border_radius:
    sm: "0.125rem"
    md: "0.375rem"
    lg: "0.5rem"
    xl: "0.75rem"
    "2xl": "1rem"
    full: "9999px"
  mode: "dark"
  token_architecture: "2-layer"      # tokens.css (primitives) → globals.css (semantic)

components:
  directory: "app/components"
  atoms:
    - "ui/Button.tsx"
    - "ui/Card.tsx"
    - "ui/Input.tsx"
    - "ui/Dropdown.tsx"
    - "ui/Modal.tsx"
    - "ui/ApplicationModal.tsx"
    - "ui/ScrollReveal.tsx"
  molecules: []
  organisms:
    - "sections/Hero.tsx"
    - "sections/PainCards.tsx"
    - "sections/Speakers.tsx"
    - "sections/Pillars.tsx"
    - "sections/PhotoGallery.tsx"
    - "sections/SocialProof.tsx"
    - "sections/EventDetails.tsx"
    - "sections/Qualification.tsx"
    - "sections/ApplicationForm.tsx"
    - "sections/FAQ.tsx"
    - "sections/Transition.tsx"
    - "layout/Footer.tsx"
  templates: []
  context:
    - "context/PopupContext.tsx"

pages:
  directory: "app"
  routes:
    - path: "/"
      file: "app/page.tsx"
      title: "Alpha Business Academy"
      status: "done"
    - path: "/login"
      file: "app/(auth)/login/page.tsx"
      status: "done"
    - path: "/dashboard"
      file: "app/(auth)/dashboard/page.tsx"
      status: "done"
    - path: "/design-system"
      file: "app/design-system/page.tsx"
      status: "done"
    - path: "/sites/[site]"
      file: "app/sites/[site]/page.tsx"
      status: "done"

conventions:
  import_style: "absolute"           # Paths absolutos com @/ prefix
  component_naming: "PascalCase"
  file_naming: "PascalCase"
  section_header_pattern: "none"
  css_pattern: "css-vars"
  token_import: "tokens/tokens.css → globals.css (auto via layout.tsx)"

deploy:
  platform: "cloudflare-pages"       # .wrangler presente
  vercel_project: true               # .vercel presente também
  domain: null
  build_command: "npm run build"
  output_dir: ".next"

meta:
  generated_at: "2026-03-13"
  generated_by: "*create-site alpha"
  last_updated: "2026-03-13"
  notes: |
    Projeto Next.js App Router com TypeScript.
    Design system em 2 camadas: tokens.css (primitivos) → globals.css (semântico).
    14 componentes já existem em app/components/ — SEMPRE reusar antes de criar novos.
    Sem Tailwind — usar apenas CSS vars do sistema de tokens.
    Para o projeto HTML estático, ver: clients/AlphaBusinessAcademy/landing_page/
