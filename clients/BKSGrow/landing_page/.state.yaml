# .state.yaml — BKS Grow Landing Page
# Gerado por: *create-site bks-grow
# NÃO commitar — adicionar ao .gitignore

design_system_discovered: true
manifest_loaded: true
brand_engine_client: "bks-grow"
brand_engine_tokens_loaded: true

tokens:
  source: "brand-engine:bks-grow + styles.css"
  colors:
    background: "#0A0A0A"
    surface: "#1A1A1A"
    card: "#151515"
    card_hover: "#1f1f1f"
    primary: "#84CC16"
    primary_light: "#A3E635"
    primary_dark: "#4D7C0F"
    primary_glow: "rgba(132, 204, 22, 0.4)"
    text_primary: "#FFFFFF"
    text_muted: "#A1A1AA"
    text_on_green: "#000000"
    border_light: "rgba(255, 255, 255, 0.08)"
    border_green: "rgba(132, 204, 22, 0.3)"
  typography:
    font_display: "Inter"
    font_body: "Inter"
    font_mono: "JetBrains Mono"
  spacing:
    section_padding: "96px 0"
    card_padding: "24px"
    max_width: "72rem"
  border_radius:
    scale: "soft"
    default: "12px"
    small: "8px"
    large: "20px"
    pill: "9999px"
  mode: "dark"

framework: "html-static"

components:
  directory: "inline"
  css_file: "styles.css"
  atoms: []
  molecules: []
  organisms:
    - "header (sticky glass)"
    - "hero-section (canvas 3d bg)"
    - "results-metrics"
    - "solucoes-section"
    - "metodo-section"
    - "diferenciais-section"
    - "faq-section"
    - "contato-form"
    - "footer"

pages:
  directory: "clients/BKSGrow/landing_page"
  existing:
    - route: "/"
      file: "index.html"
      status: "done"

workflow:
  current: "site-creation"
  current_step: "summary"
  pages_planned:
    - name: "Landing Page"
      route: "/"
      file: "index.html"
  pages_created:
    - "index.html"

meta:
  state_version: "1.0"
  initialized_at: "2026-03-13"
  last_updated: "2026-03-13"
  session_agent: "ux-design-expert"
  note: |
    Página existente preservada.
    CRÍTICO: Sempre importar styles.css antes de qualquer CSS adicional.
    Canvas WebGL no Hero é vanilla JS — não interferir ao adicionar seções.
    Agentes devem consultar este arquivo antes de criar qualquer nova página.
