# =============================================================================
# Client Briefing Template — Synkra AIOS (Master Version 1.3)
# =============================================================================
# Template for comprehensive client briefing used by agents before any work.
# Copy to: clients/{ClientName}/briefing.yaml
# Fill all fields marked with {placeholder}.
# =============================================================================

# --- META -------------------------------------------------------------------
meta:
  client_id: "{client_id}"                    # From client_config.yaml (e.g., gth_001)
  client_name: "{ClientName}"
  status: draft                               # draft | active | archived
  last_updated: "YYYY-MM-DD"
  version: "1.3"

# --- BRAND ------------------------------------------------------------------
brand:
  name: "{Brand Display Name}"
  tagline: "{One-liner tagline}"              
  mission: "{Why the company exists}"
  vision: "{Where it wants to be in 3-5 years}"
  tone_of_voice:                              
    - "{adjective_1}"
    - "{adjective_2}"
  personality_archetype: "{archetype}"        # e.g., The Sage, The Creator, The Ruler

# --- BUSINESS ---------------------------------------------------------------
business:
  segment: "{Industry/Segment}"               
  niche: "{Specific niche}"                   
  business_model: "{B2B|B2C|B2B2C}"
  pricing_tier: "{budget|mid|premium|ultra-premium}"
  main_services:
    - "{service_1}"
  geographic_focus: "{City, State, Country or Region}"

# --- STRATEGIC MECHANISM ----------------------------------------------------
# Define the unique method or process (e.g., "The Alpha Method", "RAG Engine")
mechanism:
  name: "{Mechanism Name}"
  pillars:
    - "{pillar_1}"
    - "{pillar_2}"

# --- ICP (Ideal Customer Profile) -------------------------------------------
icp:
  primary_persona:
    name: "{Persona Name}"                    
    age_range: "{XX-YY}"
    gender: "{any|male|female|mixed}"
    occupation: "{Job title or role}"
    income: "{Income range or tier}"
    location: "{City/Region}"
  pain_points:
    - "{pain_1}"
  desires:
    - "{desire_1}"
  objections:
    - "{objection_1}"
  buying_triggers:
    - "{trigger_1}"

# --- POSITIONING ------------------------------------------------------------
positioning:
  value_proposition: "{One sentence — what you deliver and why it matters}"
  differentiators:
    - "{differentiator_1}"
  main_competitors:
    - "{competitor_1}"
  competitive_advantage: "{What makes you win over competitors}"

# --- COPY -------------------------------------------------------------------
copy:
  key_messages:                               
    - "{message_1}"
  emotional_triggers:
    - "{emotion_1}"
  proof_elements:
    testimonials_available: false
    case_studies: []                          # List of case study names/titles
    certifications: []                        # e.g., Authorized Dealer for Bosch
    social_proof_numbers: "{e.g., +500 events, 98% satisfacao}"

# --- OFFERS -----------------------------------------------------------------
offers:
  main_offer:
    name: "{Offer name}"
    price_range: "{Value or 'sob consulta'}"
    description: "{Brief description}"
  entry_offer:                                
    name: "{Entry offer name}"
    price_range: "{Value}"

# --- CHANNELS ---------------------------------------------------------------
channels:
  active_channels:
    - "{channel_1}"                           
  primary_channel: "{main channel}"
  content_types:
    - "{type_1}"                              

# --- CONSTRAINTS ------------------------------------------------------------
constraints:
  what_to_avoid:
    - "{avoid_1}"                             
  brand_restrictions:
    - "{restriction_1}"                       
  legal_notes: "{Legal/compliance notes}"

# --- OPTIONAL: SERVICE PROVIDER DATA ----------------------------------------
# Fill only if applicable (for distributors/authorized services)
authorized_brands: []                         # List of brands (e.g., Makita, Bosch)
